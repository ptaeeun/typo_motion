<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Typography Motion</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:sans-serif;
}

#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:black;
    color:white;
    cursor:pointer;
    z-index:10;
}

#title{
    font-size:1rem;
    letter-spacing:0.2em;
    margin-bottom:20px;
}

#enter{
    opacity:0.6;
    font-size:0.8rem;
}

#videoWrap{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    height:100vh;
    width:auto;
    max-width:100vw;
}
</style>
</head>

<body>

<div id="startScreen">
    <div id="title">TYPOGRAPHY MOTION</div>
    <div id="enter">TAP TO ENTER</div>
</div>

<div id="videoWrap">
    <video id="video" playsinline>
        <source src="typo_motion.mp4" type="video/mp4">
    </video>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const video = document.getElementById("video");

startScreen.addEventListener("click", () => {
    startScreen.style.display = "none";
    video.play();
});
</script>

</body>
</html>
